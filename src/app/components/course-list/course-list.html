<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-5">
    <h1 class="fw-bold">Courses</h1>
    <div class="d-flex gap-2">
      <input type="text" class="form-control rounded-pill border-light shadow-sm" placeholder="Search...">
      <button class="btn btn-purple rounded-pill px-4 text-white fw-bold">Create product</button>
    </div>
  </div>

  <div class="row">
    <div class="col-lg-4 col-md-6 mb-4" *ngFor="let course of courses" [routerLink]="['/course-detail', course.id]">
      <div class="card course-outer-card p-3 shadow-sm h-100">
        
        <div class="course-banner" [ngClass]="course.colorClass">
           <i class="bi bi-laptop text-white display-4 opacity-50"></i>
        </div>

        <div class="card-body p-1">
          <span class="badge-category">{{ course.category }}</span>
          <h5 class="card-title fw-bold mt-2 text-dark">{{ course.title }}</h5>
          <p class="text-muted small">by {{ course.instructor || 'Instructor' }}</p>

          <hr class="my-3 opacity-25">

          <div class="d-flex justify-content-between align-items-center mt-3">
            <div class="course-footer-info">
              <i class="bi bi-play-circle-fill text-purple me-2"></i>
              <span>{{ course.lessons }} Lessons</span>
            </div>
            <div class="course-footer-info fw-bold">
              <i class="bi bi-star-fill rating-star me-1"></i>
              <span>4.8</span>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
