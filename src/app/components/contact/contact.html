<div class="container py-5">
  <div class="row justify-content-center text-center mb-5">
    <div class="col-lg-6">
      <h1 class="fw-bold">Get in touch</h1>
      <p class="text-muted">Have questions? We'd love to hear from you. Send us a message and we'll respond as soon as possible.</p>
    </div>
  </div>

  <div class="row g-4 justify-content-center">
    <div class="col-lg-4">
      <div class="card border-0 shadow-sm rounded-4 p-4 mb-3">
        <div class="d-flex align-items-center mb-2">
          <div class="bg-light-purple p-2 rounded-3 me-3">
            <i class="bi bi-envelope text-primary"></i>
          </div>
          <h6 class="mb-0 fw-bold">Email us</h6>
        </div>
        <p class="text-muted small mb-0">support&#64;zeusui.com</p>
      </div>
      <div class="card border-0 shadow-sm rounded-4 p-4">
        <div class="d-flex align-items-center mb-2">
          <div class="bg-light-purple p-2 rounded-3 me-3">
            <i class="bi bi-geo-alt text-primary"></i>
          </div>
          <h6 class="mb-0 fw-bold">Visit us</h6>
        </div>
        <p class="text-muted small mb-0">123 Tech Avenue, Silicon Valley, CA</p>
      </div>
    </div>

    <div class="col-lg-6">
      <div class="card border-0 shadow-sm rounded-4 p-4">
        <form>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label small fw-bold">Full Name</label>
              <input type="text" class="form-control rounded-pill bg-light border-0 px-3" placeholder="John Doe">
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-bold">Email Address</label>
              <input type="email" class="form-control rounded-pill bg-light border-0 px-3" placeholder="john&#64;example.com">
            </div>
            <div class="col-12">
              <label class="form-label small fw-bold">Message</label>
              <textarea class="form-control rounded-4 bg-light border-0 px-3" rows="4" placeholder="How can we help?"></textarea>
            </div>
            <div class="col-12 mt-4">
              <button class="btn btn-purple w-100 rounded-pill py-2 text-white fw-bold">Send Message</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
