<div class="auth-wrapper d-flex align-items-center justify-content-center">
  <div class="card auth-card shadow-lg border-0 p-4 p-md-5 rounded-5">
    <div class="text-center mb-4">
      <div class="logo-icon bg-light-purple d-inline-block p-3 rounded-circle mb-3">
        <i class="bi bi-lightning-charge-fill text-primary fs-3"></i>
      </div>
      <h2 class="fw-bold">Welcome back</h2>
      <p class="text-muted">Enter your details to access your courses</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label small fw-bold text-secondary">Email Address</label>
        <input type="email" formControlName="email" 
               class="form-control rounded-pill bg-light border-0 px-4 py-2" 
               placeholder="name@example.com">
      </div>

      <div class="mb-3">
        <div class="d-flex justify-content-between">
          <label class="form-label small fw-bold text-secondary">Password</label>
          <a href="#" class="small text-primary text-decoration-none">Forgot?</a>
        </div>
        <input type="password" formControlName="password" 
               class="form-control rounded-pill bg-light border-0 px-4 py-2" 
               placeholder="••••••••">
      </div>

      <button type="submit" [disabled]="loginForm.invalid" 
              class="btn btn-purple w-100 rounded-pill py-2 mt-3 fw-bold text-white shadow-sm">
        Sign In
      </button>

      <div class="text-center mt-4">
        <p class="small text-muted">Don't have an account? 
          <a routerLink="/register" class="text-primary fw-bold text-decoration-none">Sign up</a>
        </p>
      </div>
    </form>
  </div>
</div>
